[workspace]
name      = "platform_cli"
channels  = ["http://localhost:12222/general", "https://prefix.dev/conda-forge"]
platforms = ["linux-64"]
preview   = ["pixi-build"]

[dependencies]
platform_cli = { path = "." }

[package]
name        = "platform_cli"
version     = "1.8.0"
description = "A CLI for common scripts shared between Greenroom platform modules and platform CI"
license     = "LicenseRef-Proprietary"
authors     = ["Greenroom Robotics <team@greenroomrobotics.com>"]

[package.build.backend]
name     = "pixi-build-python"
version  = ">=0.4,<0.5"
channels = ["https://prefix.dev/pixi-build-backends", "https://prefix.dev/conda-forge"]

[package.host-dependencies]
python    = "*"
hatchling = "*"

[package.run-dependencies]
python           = "*"
toml             = "~=0.10"
setuptools       = "*"
colorama         = "*"
click            = "*"
psutil           = ">=5,<8"
python-on-whales = "*"
watchdog         = "*"
gitpython        = ">=3.1,<4"
"ruamel.yaml"    = "~=0.18"

[feature.tests.dependencies]
python           = "*"
pip              = "*"
hatchling        = "*"
pyright          = "*"
toml             = "~=0.10"
setuptools       = "*"
colorama         = "*"
click            = "*"
psutil           = ">=5,<8"
python-on-whales = "*"
watchdog         = "*"
gitpython        = ">=3.1,<4"
"ruamel.yaml"    = "~=0.18"

[feature.tests.tasks]
test = "pip install --no-deps --no-build-isolation . && pyright platform_cli"

[environments]
tests = { features = ["tests"], no-default-feature = true }
